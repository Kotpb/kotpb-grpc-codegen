// Matrix cell: proto3 with `java_multiple_files = true`.
//
// Also carries leading comments on the service and every RPC, so this is
// the fixture wired into the e2e build with --grpc-kotlin_opt=comments=true.

syntax = "proto3";

package proto3_multifiles;

option java_package = "com.example.proto3_multifiles";
option java_outer_classname = "Proto3MultifilesProto";
option java_multiple_files = true;

message EchoRequest {
  string message = 1;
}

message EchoResponse {
  string message = 1;
  int32 sequence = 2;
}

// EchoService is the canonical fixture used to verify all four RPC kinds
// round-trip correctly through our generator.
service EchoService {
  // Unary echo: sends one request and waits for one reply.
  rpc Unary(EchoRequest) returns (EchoResponse);
  // Server streaming: one request, many replies.
  rpc ServerStream(EchoRequest) returns (stream EchoResponse);
  // Client streaming: many requests, one reply.
  rpc ClientStream(stream EchoRequest) returns (EchoResponse);
  // Bidirectional streaming: many requests, many replies.
  rpc BidiStream(stream EchoRequest) returns (stream EchoResponse);
}
