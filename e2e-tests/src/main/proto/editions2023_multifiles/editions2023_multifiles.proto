// Matrix cell: edition 2023 with `java_multiple_files = true`.

edition = "2023";

package editions2023_multifiles;

option java_package = "com.example.editions2023_multifiles";
option java_outer_classname = "Editions2023MultifilesProto";
option java_multiple_files = true;

message CalcRequest {
  int64 a = 1;
  int64 b = 2;
}

message CalcResponse {
  int64 result = 1;
}

service CalcService {
  rpc Add(CalcRequest) returns (CalcResponse);
  rpc AddMany(CalcRequest) returns (stream CalcResponse);
  rpc Sum(stream CalcRequest) returns (CalcResponse);
  rpc Stream(stream CalcRequest) returns (stream CalcResponse);
}
