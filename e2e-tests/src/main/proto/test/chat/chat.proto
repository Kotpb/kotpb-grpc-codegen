edition = "2024";

package test.chat;

option java_package = "com.example.chat";
option java_outer_classname = "ChatProto";

message ChatMessage {
  string user = 1;
  string text = 2;
}

message ChatAck {
  int64 id = 1;
}

service ChatService {
  rpc Send(ChatMessage) returns (ChatAck);
  rpc Subscribe(ChatAck) returns (stream ChatMessage);
  rpc Bulk(stream ChatMessage) returns (ChatAck);
  rpc Live(stream ChatMessage) returns (stream ChatMessage);
}
