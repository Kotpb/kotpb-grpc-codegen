// Fixture for the `java_multiple_files = false` (default) path.
//
// Without that option, protoc-gen-java emits messages nested inside the
// outer file-class (NestedProto.InvoiceRequest, NestedProto.InvoiceResponse).
// Our generator's DescriptorUtil.classNameForProtoType has a dedicated branch
// for this case; this fixture exercises it end-to-end.

syntax = "proto3";

package test.nested;

option java_package = "com.example.nested";
option java_outer_classname = "NestedProto";
// java_multiple_files deliberately omitted -- defaults to false.

message InvoiceRequest {
  string id = 1;
}

message InvoiceResponse {
  string id = 1;
  int64 amount_cents = 2;
}

service InvoiceService {
  rpc GetInvoice(InvoiceRequest) returns (InvoiceResponse);
}
