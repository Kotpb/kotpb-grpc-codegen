// A proto file with messages but no `service` declarations.
//
// protoc still invokes our plugin for this file; our plugin must
// recognise that there's nothing to generate and emit zero
// CodeGeneratorResponse.File entries -- not a crash, not an empty
// stub file.

syntax = "proto3";

package test.messages_only;

option java_package = "com.example.messages_only";
option java_outer_classname = "MessagesOnlyProto";
option java_multiple_files = true;

message Ping {
  string token = 1;
}

message Pong {
  string token = 1;
}
