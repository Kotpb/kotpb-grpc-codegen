name: release-please

# Two modes:
#  * On every push to main, the action recomputes the next version from
#    Conventional-Commits subjects since the last release tag and opens or
#    amends a "chore(main): release vX.Y.Z" PR with the proposed version
#    + CHANGELOG.md diff + bumped gradle.properties.
#  * When that release PR is merged, the action sees its own merge commit,
#    cuts the tag, and creates the GitHub Release whose body is the new
#    CHANGELOG section. The tag push is what kicks off
#    `.github/workflows/native-binaries.yml` (already wired for `v*`).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Use a PAT (RELEASE_PLEASE_TOKEN) instead of GITHUB_TOKEN so the
      # tag pushed when the release PR is merged can trigger downstream
      # workflows. GitHub's tag/push events created via GITHUB_TOKEN are
      # silently dropped (loop-protection), which would leave
      # `native-binaries.yml` un-fired on every release until manually
      # dispatched. The PAT is fine-grained, scoped to this repo only,
      # with Contents+PullRequests+Issues = read/write.
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
