name: Lint PR title

# release-please derives the next version + CHANGELOG section from each
# squash-merged commit's subject (which == the PR title under squash-merge).
# Block PRs whose title isn't Conventional Commits so the release pipeline
# always has a parseable input.
on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            revert
            docs
            ci
            build
            refactor
            test
            chore
          requireScope: false
          # Subject must start with an uppercase letter or a digit and not
          # end with a period — keeps changelog entries tidy.
          subjectPattern: ^[A-Z0-9].*[^.]$
          subjectPatternError: |
            The PR title's subject (the part after `<type>(<scope>)?:`) must
            start with an uppercase letter or digit and not end with a period.
            For example: `feat: Add idempotency option support` (good)
            vs `feat: add idempotency option support.` (bad).
