name: Native binaries

on:
  workflow_dispatch:
  push:
    tags: ['v*']
  pull_request:
    paths:
      - '.github/workflows/native-binaries.yml'
      - 'plugin/**'
      - 'generator/**'
      - 'buildSrc/**'
      - 'gradle/libs.versions.toml'

permissions:
  contents: write     # required by softprops/action-gh-release on tag push

jobs:
  build:
    name: ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Static-link against musl on Linux (both arches) so the binary
          # runs on every glibc version and inside minimal containers
          # (alpine, distroless).
          - os: ubuntu-latest
            target: linux-x86_64
            binary: protoc-gen-grpc-kotlin
            musl: true
            extra-build-args: '--static --libc=musl'
          - os: ubuntu-24.04-arm
            target: linux-aarch64
            binary: protoc-gen-grpc-kotlin
            musl: true
            extra-build-args: '--static --libc=musl'
          - os: macos-13
            target: macos-x86_64
            binary: protoc-gen-grpc-kotlin
            musl: false
            extra-build-args: ''
          - os: macos-latest
            target: macos-aarch64
            binary: protoc-gen-grpc-kotlin
            musl: false
            extra-build-args: ''
          - os: windows-latest
            target: windows-x86_64
            binary: protoc-gen-grpc-kotlin.exe
            musl: false
            extra-build-args: ''
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          cache: gradle
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-musl: ${{ matrix.musl }}
          native-image-job-reports: 'true'

      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build native binary
        shell: bash
        run: |
          extra="${{ matrix.extra-build-args }}"
          if [[ -n "$extra" ]]; then
            ./gradlew :plugin:nativeCompile --no-daemon -PextraNativeBuildArgs="$extra"
          else
            ./gradlew :plugin:nativeCompile --no-daemon
          fi

      # Smoke test: run the produced binary as a real protoc plugin against
      # an existing fixture and check the generated source for key symbols.
      # Runs on every platform / arch in the matrix.
      - name: Set up protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '34.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Smoke-test the binary as a protoc plugin
        shell: bash
        run: |
          set -euo pipefail
          binary="$PWD/plugin/build/native/nativeCompile/${{ matrix.binary }}"
          out="$PWD/smoke-out"
          rm -rf "$out" && mkdir -p "$out"

          fixture_dir="e2e-tests/src/main/proto/proto3_multifiles"
          fixture="proto3_multifiles.proto"

          protoc \
            --plugin=protoc-gen-grpc-kotlin="$binary" \
            --grpc-kotlin_out="$out" \
            -I "$fixture_dir" \
            "$fixture"

          generated="$out/com/example/proto3_multifiles/EchoServiceGrpcKt.kt"
          test -f "$generated" || { echo "FAIL: $generated not produced"; exit 1; }

          # Spot-check the symbols our generator should always produce.
          grep -q 'public class EchoServiceCoroutineStub'        "$generated"
          grep -q 'public abstract class EchoServiceCoroutineImplBase' "$generated"
          grep -q 'SERVICE_NAME: String = "proto3_multifiles.EchoService"' "$generated"
          grep -q 'public suspend fun unary'                     "$generated"
          grep -q 'public fun bidiStream'                        "$generated"

          echo "Smoke test passed on ${{ matrix.target }}."

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p out
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp "plugin/build/native/nativeCompile/${{ matrix.binary }}" "out/protoc-gen-grpc-kotlin-${{ matrix.target }}.exe"
          else
            cp "plugin/build/native/nativeCompile/${{ matrix.binary }}" "out/protoc-gen-grpc-kotlin-${{ matrix.target }}"
            chmod +x "out/protoc-gen-grpc-kotlin-${{ matrix.target }}"
          fi
          ls -la out/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: protoc-gen-grpc-kotlin-${{ matrix.target }}
          path: out/*
          if-no-files-found: error

  release:
    name: Attach to GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List downloaded files
        run: ls -la dist/

      - name: Attach binaries to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
