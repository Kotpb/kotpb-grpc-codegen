name: Native binaries

on:
  workflow_dispatch:
  push:
    tags: ['v*']
  pull_request:
    paths:
      - '.github/workflows/native-binaries.yml'
      - 'plugin/**'
      - 'generator/**'
      - 'buildSrc/**'
      - 'gradle/libs.versions.toml'

permissions:
  contents: write     # required by softprops/action-gh-release on tag push

# Cancel superseded native-binaries runs on the same ref while a PR is
# iterating. Tag pushes keep their own concurrency group so a release run
# is never killed by an unrelated tag landing seconds later.
concurrency:
  group: native-binaries-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: ${{ matrix.classifier }}
    strategy:
      fail-fast: false
      matrix:
        # `classifier` follows the protobuf-gradle-plugin convention so the
        # binaries can be consumed as `<group>:<artifact>:<version>:<classifier>@exe`.
        # Note the `_64` (with underscore) on aarch_64 / x86_64 — that's the
        # Maven Central convention `protoc-gen-grpc-java` and friends use.
        include:
          - os: ubuntu-latest
            classifier: linux-x86_64
            binary: protoc-gen-grpc-kotlin
            musl: true
            extra-build-args: '--static --libc=musl'
          - os: ubuntu-24.04-arm
            classifier: linux-aarch_64
            binary: protoc-gen-grpc-kotlin
            # GraalVM CE doesn't ship static musl libs for linux-aarch64 —
            # the JDK distribution has lib/static/linux-aarch64/glibc/ but
            # no musl sibling (oracle/graal#4645, #10018, both closed "not
            # planned"). graalvm/setup-graalvm@v1 has nothing aarch64 to
            # wire either. So aarch64 ships "mostly-static": GraalVM
            # runtime + zlib are statically linked, libc stays dynamic
            # against glibc. Runs on every mainstream aarch64 distro and
            # gcr.io/distroless/base. Won't run on alpine:aarch64 — that
            # would need a separate alpine-arm64 docker-based build.
            musl: false
            extra-build-args: '-H:+StaticExecutableWithDynamicLibC'
          # No osx-x86_64 entry: GitHub-hosted macos-13 (Intel) runners are
          # being phased out (macos-12 retired Dec 2024, macos-13 next), and
          # the queue has been chronically empty. Apple has shipped only
          # Apple Silicon since 2020, so Intel-Mac coverage is increasingly
          # niche; Intel Mac users can fall back to the JVM dist.
          - os: macos-latest
            classifier: osx-aarch_64
            binary: protoc-gen-grpc-kotlin
            musl: false
            extra-build-args: ''
          - os: windows-latest
            classifier: windows-x86_64
            binary: protoc-gen-grpc-kotlin.exe
            musl: false
            extra-build-args: ''
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@60c26726de13f8b90771df4bc1641a52a3159994 # v1
        with:
          java-version: '25'
          distribution: 'graalvm-community'
          # Gradle caching is handled by gradle/actions/setup-gradle below
          # (richer: caches Gradle dist + build cache + per-config keys).
          # Leaving setup-graalvm's `cache: gradle` here would compete on the
          # same paths and trip cache-corruption warnings.
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-musl: ${{ matrix.musl }}
          native-image-job-reports: 'true'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6

      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1

      - name: Read project version
        id: ver
        shell: bash
        run: |
          v=$(./gradlew -q :plugin:properties --no-daemon | awk '/^version: /{print $2}')
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Project version: $v"

      - name: Build native binary and JVM distribution
        shell: bash
        # extra-build-args may be empty; the Gradle config filters blanks, so
        # passing an empty -P value is a no-op and we don't need a conditional.
        # shadowJar is only built on linux-x86_64 because the JAR is a pure-JVM
        # artifact whose contents are byte-identical regardless of host OS;
        # building it once avoids 4× duplicated work and 4× upload churn.
        run: |
          tasks=":plugin:nativeCompile :plugin:installDist"
          if [[ "${{ matrix.classifier }}" == "linux-x86_64" ]]; then
            tasks="$tasks :plugin:shadowJar"
          fi
          ./gradlew $tasks --no-daemon \
            -PextraNativeBuildArgs="${{ matrix.extra-build-args }}"

      - name: Set up protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3
        with:
          version: '34.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # Smoke test: native binary's output must match the JVM dist's output
      # byte-for-byte on the same input. Catches reflection / class-init
      # regressions that survive --strict-image-heap.
      - name: Smoke-test native binary against JVM output
        shell: bash
        run: |
          set -euo pipefail

          native_binary="$PWD/plugin/build/native/nativeCompile/${{ matrix.binary }}"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            jvm_script="$PWD/plugin/build/install/protoc-gen-grpc-kotlin/bin/protoc-gen-grpc-kotlin.bat"
          else
            jvm_script="$PWD/plugin/build/install/protoc-gen-grpc-kotlin/bin/protoc-gen-grpc-kotlin"
          fi

          native_out="$PWD/smoke-native"
          jvm_out="$PWD/smoke-jvm"
          rm -rf "$native_out" "$jvm_out"
          mkdir -p "$native_out" "$jvm_out"

          fixture_dir="e2e-tests/src/main/proto/proto3_multifiles"
          fixture="proto3_multifiles.proto"

          protoc --plugin=protoc-gen-grpc-kotlin="$native_binary" \
                 --grpc-kotlin_out="$native_out" \
                 -I "$fixture_dir" "$fixture"
          protoc --plugin=protoc-gen-grpc-kotlin="$jvm_script" \
                 --grpc-kotlin_out="$jvm_out" \
                 -I "$fixture_dir" "$fixture"

          rel="com/example/proto3_multifiles/EchoServiceGrpcKt.kt"
          test -f "$native_out/$rel" || { echo "FAIL: native binary produced no $rel"; exit 1; }
          test -f "$jvm_out/$rel"    || { echo "FAIL: JVM dist produced no $rel";    exit 1; }

          if ! diff -u "$jvm_out/$rel" "$native_out/$rel"; then
            echo "FAIL: native binary output diverges from JVM output on ${{ matrix.classifier }}"
            exit 1
          fi
          echo "Smoke test passed on ${{ matrix.classifier }}: native ≡ JVM."

          # Extra check on linux-x86_64 (the only job that builds shadowJar):
          # the fat JAR's output must also match. Catches shadowing-time
          # regressions like service-loader files getting mismerged or
          # resources stripped, and protects the published `:jvm@jar`
          # classifier from drifting away from the rest of the publication.
          if [[ "${{ matrix.classifier }}" == "linux-x86_64" ]]; then
            shadow_jar=$(ls "$PWD/plugin/build/libs/kotpb-grpc-codegen-"*"-jvm.jar")
            shadow_out="$PWD/smoke-shadow"
            rm -rf "$shadow_out"; mkdir -p "$shadow_out"
            shadow_script="$PWD/run-shadow.sh"
            # Build the wrapper without a heredoc so YAML indentation can't
            # leak into the file content and break the shebang.
            printf '#!/usr/bin/env bash\nexec java -jar "%s" "$@"\n' "$shadow_jar" > "$shadow_script"
            chmod +x "$shadow_script"
            protoc --plugin=protoc-gen-grpc-kotlin="$shadow_script" \
                   --grpc-kotlin_out="$shadow_out" \
                   -I "$fixture_dir" "$fixture"
            test -f "$shadow_out/$rel" || { echo "FAIL: shadow JAR produced no $rel"; exit 1; }
            if ! diff -u "$jvm_out/$rel" "$shadow_out/$rel"; then
              echo "FAIL: shadow JAR output diverges from JVM dist output"
              exit 1
            fi
            echo "Shadow JAR smoke test passed: shadowJar ≡ JVM dist ≡ native."
            rm "$shadow_script"
          fi

      # Stage the binary using the Maven artifact naming convention --
      #   kotpb-grpc-codegen-<version>-<classifier>.exe
      # -- so consumers pulling from a Maven repo (or downloading from a
      # GitHub Release) get a filename that matches the classifier they
      # requested. The `.exe` extension is the Maven convention for protoc
      # plugins, used uniformly across all OSes.
      - name: Stage Maven-conventional artifact
        id: stage
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.ver.outputs.version }}"
          classifier="${{ matrix.classifier }}"
          src="plugin/build/native/nativeCompile/${{ matrix.binary }}"
          dst_name="kotpb-grpc-codegen-${version}-${classifier}.exe"

          mkdir -p out
          cp "$src" "out/$dst_name"
          if [[ "${{ runner.os }}" != "Windows" ]]; then
            chmod +x "out/$dst_name"
          fi
          ls -la out/
          echo "artifact-name=$dst_name" >> "$GITHUB_OUTPUT"

      - name: Upload binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: kotpb-grpc-codegen-${{ matrix.classifier }}
          path: out/*
          if-no-files-found: error

      # The shadowJar's archiveBaseName + archiveClassifier already produce
      # plugin/build/libs/kotpb-grpc-codegen-<version>-jvm.jar in the exact
      # naming aggregate-mode expects, so we just upload it under a matching
      # artifact name. Only the linux-x86_64 job uploads it (JAR contents are
      # platform-independent; see the build step's comment).
      - name: Upload JVM-fallback JAR
        if: matrix.classifier == 'linux-x86_64'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: kotpb-grpc-codegen-jvm
          path: plugin/build/libs/kotpb-grpc-codegen-${{ steps.ver.outputs.version }}-jvm.jar
          if-no-files-found: error

  release:
    name: Attach to GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all binary artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist
          pattern: 'kotpb-grpc-codegen-*'
          merge-multiple: true

      - name: List downloaded files
        run: ls -la dist/

      # Build artifacts carry the .exe extension uniformly because the
      # Maven Central convention for protoc plugins uses .exe across all
      # OSes — that's how protobuf-gradle-plugin resolves the per-platform
      # classifier. But the GitHub Release is for humans grabbing the
      # binary directly, where a Linux/macOS file ending in `.exe` reads
      # as a Windows binary. Strip `.exe` from non-Windows assets here
      # only; the Maven Central job (which downloads the same artifacts
      # under their original .exe names from a separate path) is unaffected.
      - name: Strip .exe from non-Windows binaries
        run: |
          set -euo pipefail
          cd dist
          shopt -s nullglob
          for cls in linux-x86_64 linux-aarch_64 osx-aarch_64; do
            for f in kotpb-grpc-codegen-*-"$cls".exe; do
              mv "$f" "${f%.exe}"
            done
          done
          ls -la

      - name: Attach binaries to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          files: dist/*
          fail_on_unmatched_files: true

  publish-maven-central:
    name: Publish to Maven Central
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6

      # Pull every classifier .exe produced by the matrix into one folder
      # so the aggregate-mode publish below has all four binaries in
      # the layout it expects.
      - name: Download all native binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: native-binaries
          pattern: 'kotpb-grpc-codegen-*'
          merge-multiple: true

      # ONE Gradle invocation. The plugin's aggregate-mode adds all four
      # classifiers to the single `nativeBinary` publication, gradle-nexus-
      # publish-plugin batches them into ONE Sonatype Central deployment,
      # and closeAndRelease finalises atomically. publishingType is
      # USER_MANAGED by default — we'll review and release in the Central
      # Portal UI for the first few releases until we're confident.
      - name: Publish + close + release on Sonatype Central
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        run: |
          # Sanity-check secrets are wired and that the SIGNING_KEY survived
          # the round-trip through `gh secret set` with newlines intact —
          # a single-line key block fails inside the signing task with the
          # cryptic "no value available" provider error.
          if [[ -z "${SONATYPE_USERNAME:-}" || -z "${SONATYPE_PASSWORD:-}" ]]; then
            echo "::error::SONATYPE_USERNAME / SONATYPE_PASSWORD secrets not set"; exit 1
          fi
          if [[ -z "${SIGNING_KEY:-}" || -z "${SIGNING_PASSWORD:-}" ]]; then
            echo "::error::SIGNING_KEY / SIGNING_PASSWORD secrets not set"; exit 1
          fi
          if ! grep -q '^-----BEGIN PGP PRIVATE KEY BLOCK-----$' <<<"$SIGNING_KEY"; then
            echo "::error::SIGNING_KEY must start with a line containing exactly '-----BEGIN PGP PRIVATE KEY BLOCK-----'. Re-export with 'gpg --armor --export-secret-keys <KEY-ID>' and pipe it into 'gh secret set SIGNING_KEY'."
            exit 1
          fi
          if ! grep -q '^-----END PGP PRIVATE KEY BLOCK-----$' <<<"$SIGNING_KEY"; then
            echo "::error::SIGNING_KEY ends incorrectly — line containing exactly '-----END PGP PRIVATE KEY BLOCK-----' missing. Newlines were probably stripped when setting the secret."
            exit 1
          fi

          # Diagnostic: show the structure of SIGNING_KEY (which keys are
          # in the block, capabilities flags, and crucially whether the
          # master is a stub `sec#` or has private material `sec`). The
          # signing task fails with "no value available" when extractPrivateKey
          # returns null — which happens when the first key in the ring (the
          # master) is a stub or certify-only. The output here tells us
          # exactly which case we're in. Self-test: also try gpg-signing a
          # tiny payload — succeeds iff the chosen key has signing
          # capability + extractable private bytes.
          echo "::group::SIGNING_KEY structure"
          export GNUPGHOME=$(mktemp -d)
          chmod 700 "$GNUPGHOME"
          echo "$SIGNING_KEY" | gpg --batch --import 2>&1 || true
          gpg --list-secret-keys --keyid-format=long --with-fingerprint || true
          echo
          echo "--- self-test: detach-sign a payload ---"
          if echo "test" | gpg --batch --pinentry-mode loopback \
              --passphrase "$SIGNING_PASSWORD" --armor --detach-sign 2>&1 | head -5; then
            echo "(gpg signing succeeded)"
          else
            echo "(gpg signing FAILED — same root cause Gradle is hitting)"
          fi
          rm -rf "$GNUPGHOME"
          unset GNUPGHOME
          echo "::endgroup::"

          ./gradlew :plugin:publishNativeBinaryPublicationToSonatypeRepository \
            closeAndReleaseSonatypeStagingRepository \
            -PnativeBinariesDir="$PWD/native-binaries" --no-daemon --stacktrace
