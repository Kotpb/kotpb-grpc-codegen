name: Native binaries

on:
  workflow_dispatch:
  push:
    tags: ['v*']
  pull_request:
    paths:
      - '.github/workflows/native-binaries.yml'
      - 'plugin/**'
      - 'generator/**'
      - 'buildSrc/**'
      - 'gradle/libs.versions.toml'

permissions:
  contents: write     # required by softprops/action-gh-release on tag push

jobs:
  build:
    name: ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
            binary: protoc-gen-grpc-kotlin
            # Static-link against musl on Linux so the binary works on every
            # glibc version and inside minimal containers (alpine, distroless).
            musl: true
            extra-build-args: '--static --libc=musl'
          - os: macos-13
            target: macos-x86_64
            binary: protoc-gen-grpc-kotlin
            musl: false
            extra-build-args: ''
          - os: macos-latest
            target: macos-aarch64
            binary: protoc-gen-grpc-kotlin
            musl: false
            extra-build-args: ''
          - os: windows-latest
            target: windows-x86_64
            binary: protoc-gen-grpc-kotlin.exe
            musl: false
            extra-build-args: ''
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          cache: gradle
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-musl: ${{ matrix.musl }}
          native-image-job-reports: 'true'

      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build native binary
        shell: bash
        run: |
          extra="${{ matrix.extra-build-args }}"
          if [[ -n "$extra" ]]; then
            ./gradlew :plugin:nativeCompile --no-daemon -PextraNativeBuildArgs="$extra"
          else
            ./gradlew :plugin:nativeCompile --no-daemon
          fi

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p out
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp "plugin/build/native/nativeCompile/${{ matrix.binary }}" "out/protoc-gen-grpc-kotlin-${{ matrix.target }}.exe"
          else
            cp "plugin/build/native/nativeCompile/${{ matrix.binary }}" "out/protoc-gen-grpc-kotlin-${{ matrix.target }}"
            chmod +x "out/protoc-gen-grpc-kotlin-${{ matrix.target }}"
          fi
          ls -la out/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: protoc-gen-grpc-kotlin-${{ matrix.target }}
          path: out/*
          if-no-files-found: error

  release:
    name: Attach to GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List downloaded files
        run: ls -la dist/

      - name: Attach binaries to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
