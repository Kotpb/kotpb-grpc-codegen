name: Native binaries

on:
  workflow_dispatch:
  push:
    tags: ['v*']
  pull_request:
    paths:
      - '.github/workflows/native-binaries.yml'
      - 'plugin/**'
      - 'generator/**'
      - 'buildSrc/**'
      - 'gradle/libs.versions.toml'

permissions:
  contents: write     # required by softprops/action-gh-release on tag push

jobs:
  build:
    name: ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Static-link against musl on Linux (both arches) so the binary
          # runs on every glibc version and inside minimal containers
          # (alpine, distroless).
          - os: ubuntu-latest
            target: linux-x86_64
            binary: protoc-gen-grpc-kotlin
            musl: true
            extra-build-args: '--static --libc=musl'
          - os: ubuntu-24.04-arm
            target: linux-aarch64
            binary: protoc-gen-grpc-kotlin
            musl: true
            extra-build-args: '--static --libc=musl'
          - os: macos-13
            target: macos-x86_64
            binary: protoc-gen-grpc-kotlin
            musl: false
            extra-build-args: ''
          - os: macos-latest
            target: macos-aarch64
            binary: protoc-gen-grpc-kotlin
            musl: false
            extra-build-args: ''
          - os: windows-latest
            target: windows-x86_64
            binary: protoc-gen-grpc-kotlin.exe
            musl: false
            extra-build-args: ''
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          cache: gradle
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-musl: ${{ matrix.musl }}
          native-image-job-reports: 'true'

      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build native binary and JVM distribution
        shell: bash
        run: |
          extra="${{ matrix.extra-build-args }}"
          # installDist gives us the JVM-mode plugin script we'll diff
          # against; nativeCompile gives us the native binary under test.
          if [[ -n "$extra" ]]; then
            ./gradlew :plugin:nativeCompile :plugin:installDist --no-daemon \
              -PextraNativeBuildArgs="$extra"
          else
            ./gradlew :plugin:nativeCompile :plugin:installDist --no-daemon
          fi

      - name: Set up protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '34.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # Smoke test: invoke the produced native binary as a real protoc
      # plugin and verify its output is byte-identical to the JVM-mode
      # plugin's output on the same input. Any divergence here means
      # native-image broke something (reflection, class init, resource
      # lookup, ...) -- and the only way to know is to compare against
      # the trusted JVM build.
      - name: Smoke-test native binary against JVM output
        shell: bash
        run: |
          set -euo pipefail

          native_binary="$PWD/plugin/build/native/nativeCompile/${{ matrix.binary }}"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            jvm_script="$PWD/plugin/build/install/protoc-gen-grpc-kotlin/bin/protoc-gen-grpc-kotlin.bat"
          else
            jvm_script="$PWD/plugin/build/install/protoc-gen-grpc-kotlin/bin/protoc-gen-grpc-kotlin"
          fi

          native_out="$PWD/smoke-native"
          jvm_out="$PWD/smoke-jvm"
          rm -rf "$native_out" "$jvm_out"
          mkdir -p "$native_out" "$jvm_out"

          fixture_dir="e2e-tests/src/main/proto/proto3_multifiles"
          fixture="proto3_multifiles.proto"

          # Run the same proto through both plugins.
          protoc --plugin=protoc-gen-grpc-kotlin="$native_binary" \
                 --grpc-kotlin_out="$native_out" \
                 -I "$fixture_dir" "$fixture"
          protoc --plugin=protoc-gen-grpc-kotlin="$jvm_script" \
                 --grpc-kotlin_out="$jvm_out" \
                 -I "$fixture_dir" "$fixture"

          rel="com/example/proto3_multifiles/EchoServiceGrpcKt.kt"
          native_file="$native_out/$rel"
          jvm_file="$jvm_out/$rel"

          test -f "$native_file" || { echo "FAIL: native binary produced no $rel"; exit 1; }
          test -f "$jvm_file"    || { echo "FAIL: JVM dist produced no $rel";    exit 1; }

          # Byte-for-byte comparison. KotlinPoet output is deterministic
          # (no timestamps, stable iteration order), so any difference
          # here is a real regression.
          if ! diff -u "$jvm_file" "$native_file"; then
            echo "FAIL: native binary output diverges from JVM output on ${{ matrix.target }}"
            exit 1
          fi

          echo "Smoke test passed on ${{ matrix.target }}: native output is identical to JVM output."

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p out
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp "plugin/build/native/nativeCompile/${{ matrix.binary }}" "out/protoc-gen-grpc-kotlin-${{ matrix.target }}.exe"
          else
            cp "plugin/build/native/nativeCompile/${{ matrix.binary }}" "out/protoc-gen-grpc-kotlin-${{ matrix.target }}"
            chmod +x "out/protoc-gen-grpc-kotlin-${{ matrix.target }}"
          fi
          ls -la out/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: protoc-gen-grpc-kotlin-${{ matrix.target }}
          path: out/*
          if-no-files-found: error

  release:
    name: Attach to GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List downloaded files
        run: ls -la dist/

      - name: Attach binaries to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
