name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Default to read-only token; jobs that need more declare it themselves.
permissions:
  contents: read

# Cancel in-flight CI runs on the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build + test (linux-x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '34.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: ./gradlew build
        run: ./gradlew build --no-daemon --stacktrace

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
            **/build/test-results/
          if-no-files-found: ignore
