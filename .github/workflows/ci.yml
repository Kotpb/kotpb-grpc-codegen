name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Default to read-only token; jobs that need more declare it themselves.
permissions:
  contents: read

# Cancel in-flight CI runs on the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build + test (linux-x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6

      - name: Set up protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3
        with:
          version: '34.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # nativeCompile is exercised by `.github/workflows/native-binaries.yml`
      # (which uses graalvm/setup-graalvm@v1 with proper bin/ permissions).
      # The foojay-downloaded GraalVM that Gradle resolves on bare runners
      # lands native-image without +x, so skip it here and let the dedicated
      # workflow cover it.
      - name: ./gradlew build (without nativeCompile)
        run: ./gradlew build -x :plugin:nativeCompile --no-daemon --stacktrace

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
            **/build/test-results/
          if-no-files-found: ignore
